<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ricerca Territoriale Avanzata</title>

    <!-- 1. CSS: Bootstrap 5 + Select2 + Tema Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />

    <style>
        body { padding: 50px; background-color: #f0f2f5; }
        .container { max-width: 500px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .result-box { display: none; margin-top: 25px; padding: 15px; background: #e9ecef; border-radius: 8px; border-left: 5px solid #0d6efd; }
    </style>
</head>
<body>

<div class="container">
    <h3 class="mb-4 text-primary">🌍 Ricerca Comuni</h3>
   
    <!-- REGIONE -->
    <div class="mb-3">
        <label class="form-label fw-bold">Regione</label>
        <select class="form-select" id="regione" data-placeholder="Scegli una regione...">
            <option></option>
        </select>
    </div>

    <!-- PROVINCIA -->
    <div class="mb-3">
        <label class="form-label fw-bold">Provincia</label>
        <select class="form-select" id="provincia" data-placeholder="Scegli una provincia..." disabled>
            <option></option>
        </select>
    </div>

    <!-- COMUNE -->
    <div class="mb-4">
        <label class="form-label fw-bold">Comune</label>
        <select class="form-select" id="comune" data-placeholder="Cerca un comune..." disabled>
            <option></option>
        </select>
    </div>

    <!-- RISULTATI -->
    <div id="risultato" class="result-box">
        <p class="mb-1"><strong>📍 CAP:</strong> <span id="resCap" class="text-secondary">-</span></p>
        <p class="mb-0"><strong>🆔 Sigla:</strong> <span id="resSigla" class="text-secondary">-</span></p>
    </div>
</div>

<!-- 2. JS: jQuery + Select2 -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<script>
    $(document).ready(function() {
        // Configurazione comune Select2
        const s2Options = { theme: "bootstrap-5", width: '100%' };

        // Inizializzazione
        $('#regione').select2(s2Options);
        $('#provincia').select2(s2Options);
        $('#comune').select2(s2Options);

        // Eventi Select2
        $('#regione').on('select2:select', caricaProvince);
        $('#provincia').on('select2:select', caricaComuni);
        $('#comune').on('select2:select', mostraRisultati);

        // Caricamento iniziale Regioni
        caricaRegioni();
    });

    async function caricaRegioni() {
        try {
            const res = await fetch('/api/regioni');
            const regioni = await res.json();
            const select = $('#regione');
            regioni.forEach(r => select.append(new Option(r, r)));
            select.trigger('change');
        } catch (e) { console.error("Errore Regioni:", e); }
    }

    async function caricaProvince() {
        const reg = $('#regione').val();
        const res = await fetch(`/api/province?regione=${encodeURIComponent(reg)}`);
        const province = await res.json();
        const select = $('#provincia');
        
        select.empty().append('<option></option>');
        province.forEach(p => select.append(new Option(p, p)));
        select.prop('disabled', false).trigger('change');
        $('#comune').prop('disabled', true).empty().trigger('change');
        $('#risultato').hide();
    }

    async function caricaComuni() {
        const prov = $('#provincia').val();
        const res = await fetch(`/api/comuni?provincia=${encodeURIComponent(prov)}`);
        const comuni = await res.json();
        const select = $('#comune');
        
        select.empty().append('<option></option>');
        comuni.forEach(c => select.append(new Option(c, c)));
        select.prop('disabled', false).trigger('change');
    }

    async function mostraRisultati() {
        const nome = $('#comune').val();
        try {
            const resCap = await fetch(`/api/find/cap?comune=${encodeURIComponent(nome)}`);
            const caps = await resCap.json();
            const resSigla = await fetch(`/api/find/sigla?comune=${encodeURIComponent(nome)}`);
            const sigla = await resSigla.text();

            $('#resCap').text(caps.join(", "));
            $('#resSigla').text(sigla);
            $('#risultato').fadeIn();
        } catch (e) { console.error("Errore Dati:", e); }
    }
</script>

</body>
</html>
