<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Ricerca Avanzata Comuni</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 400px; }
        select, button { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #ddd; }
        button { background: #28a745; color: white; font-weight: bold; border: none; margin-top: 20px; cursor: pointer; }
        .result { margin-top: 20px; border-top: 2px solid #eee; pt: 15px; display: none; }
    </style>
</head>
<body onload="caricaRegioni()">

<div class="card">
    <h3>Restituisci CAP e Sigla</h3>
    
    <label>Regione</label>
    <select id="regione" onchange="caricaProvince()">
        <option value="">Seleziona Regione</option>
    </select>

    <label>Provincia</label>
    <select id="provincia" onchange="caricaComuni()" disabled>
        <option value="">Seleziona Provincia</option>
    </select>

	<label>Comune</label>
		<select id="comune" onchange="mostraRisultati()" disabled>
		    <option value="">Seleziona Comune</option>
		</select>
	
<!--	<label>Comune</label>
		    <select id="comune" disabled>
		        <option value="">Seleziona Comune</option>
		    </select> 
	
	    <button onclick="mostraRisultati()">SCOPRI DATI</button> -->
	
	    <div id="risultato" class="result">
	        <p><strong>CAP:</strong> <span id="resCap">-</span></p>
	        <p><strong>Sigla:</strong> <span id="resSigla">-</span></p>
	    </div> 
</div>

<script>
    async function caricaRegioni() {
        const res = await fetch('/api/regioni');
        const regioni = await res.json();
        const select = document.getElementById('regione');
        regioni.forEach(r => select.innerHTML += `<option value="${r}">${r}</option>`);
    }

    async function caricaProvince() {
        const reg = document.getElementById('regione').value;
        const res = await fetch(`/api/province?regione=${reg}`);
        const province = await res.json();
        const select = document.getElementById('provincia');
        select.innerHTML = '<option value="">Seleziona Provincia</option>';
        province.forEach(p => select.innerHTML += `<option value="${p}">${p}</option>`);
        select.disabled = false;
    }

    async function caricaComuni() {
        const prov = document.getElementById('provincia').value;
        const res = await fetch(`/api/comuni?provincia=${prov}`);
        const comuni = await res.json();
        const select = document.getElementById('comune');
        select.innerHTML = '<option value="">Seleziona Comune</option>';
        comuni.forEach(c => select.innerHTML += `<option value="${c}">${c}</option>`);
        select.disabled = false;
    }

		async function mostraRisultati() {
		    const nome = document.getElementById('comune').value;
		    const divRisultato = document.getElementById('risultato');
		 
	if (!nome) {
	        divRisultato.style.display = 'none';
	        return;
	    }

	    try {
	        // Chiamata per i CAP
	        const resCap = await fetch(`/api/find/cap?nome=${nome}`);
	        const caps = await resCap.json();

	        // Chiamata per la Sigla
	        const resSigla = await fetch(`/api/find/sigla?nome=${nome}`);
	        const sigla = await resSigla.text();

	        // Aggiorniamo l'interfaccia
	        document.getElementById('resCap').innerText = caps.join(", ");
	        document.getElementById('resSigla').innerText = sigla;
	        
	        // Rendiamo visibile il div dei risultati
	        document.getElementById('risultato').style.display = 'block'; 
	    } catch (error) {
	        console.error("Errore nel recupero dati:", error);
	    }
	} 

  
</script>
</body>
</html>
